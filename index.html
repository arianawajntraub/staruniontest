        function renderPage() {
            const viewport = document.getElementById('slide-viewport');
            viewport.innerHTML = dossierPages[currentPage].render();
            document.getElementById('page-indicator').textContent = currentPage + 1;

            // Handle Nav indicators
            for (let i = 0; i < totalPages; i++) {
                const btn = document.getElementById(`nav-btn-${i}`);
                if (btn) {
                    if (i === currentPage) {
                        btn.className = "w-full text-left px-3 py-2.5 rounded-lg text-sm font-medium transition-colors bg-star-green text-white flex items-center gap-2";
                    } else {
                        btn.className = "w-full text-left px-3 py-2.5 rounded-lg text-sm font-medium transition-colors text-star-light hover:bg-star-green hover:text-white flex items-center gap-2";
                    }
                }
            }

            // Handle Bottom buttons status
            const prev = document.getElementById('prev-btn');
            const next = document.getElementById('next-btn');

            if (currentPage === 0) {
                prev.disabled = true;
                prev.className = "px-4 py-2 bg-gray-200 hover:bg-gray-300 text-star-charcoal text-sm font-semibold rounded-lg transition-colors opacity-50 cursor-not-allowed";
            } else {
                prev.disabled = false;
                prev.className = "px-4 py-2 bg-gray-200 hover:bg-gray-300 text-star-charcoal text-sm font-semibold rounded-lg transition-colors cursor-pointer";
            }

            if (currentPage === totalPages - 1) {
                next.textContent = "Finalizar";
                next.className = "px-5 py-2 bg-star-yellow text-star-dark text-sm font-bold rounded-lg transition-colors shadow border border-yellow-500";
            } else {
                next.textContent = "Siguiente";
                next.className = "px-5 py-2 bg-star-green hover:bg-star-dark text-white text-sm font-semibold rounded-lg transition-colors shadow";
            }

            // Trigger internal slide tool initializations
            if (currentPage === 4) {
                selectService(0); // init services tab
            } else if (currentPage === 6) {
                buildClientsList(); // init references tab
            }
        }

        function nextPage() {
            if (currentPage < totalPages - 1) {
                currentPage++;
                renderPage();
            } else {
                // Return to cover
                currentPage = 0;
                renderPage();
            }
        }

        function prevPage() {
            if (currentPage > 0) {
                currentPage--;
                renderPage();
            }
        }

        function goToPage(idx) {
            currentPage = idx;
            renderPage();
        }

        // --- Presenteeism Simulator Engine (Page 4) ---
        let simInterval = null;
        function triggerSimulator() {
            const display = document.getElementById('sim-display');
            const btn = document.getElementById('sim-btn');
            
            btn.disabled = true;
            btn.className = "w-full py-2 bg-gray-300 text-gray-500 font-semibold text-xs rounded cursor-not-allowed uppercase tracking-wider z-10 relative";

            let step = 0;
            const timeline = [
                { time: "06:00 hs", msg: "🚨 Alerta: Oficial de limpieza asignado no registró ingreso biométrico en planta." },
                { time: "06:05 hs", msg: "⚙️ Sistema automatizado notifica a Supervisor de Zona Star Union." },
                { time: "06:15 hs", msg: "🚚 Base Operativa activa Oficial de relevo con uniforme y EPP reglamentario." },
                { time: "06:30 hs", msg: "✅ Relevo ingresa al puesto asignado. Continuidad de servicio garantizada." }
            ];

            display.innerHTML = `<p class="font-bold text-star-green">Procesando alerta en tiempo real...</p>`;

            simInterval = setInterval(() => {
                if (step < timeline.length) {
                    display.innerHTML = `
                        <p class="font-bold text-star-green">${timeline[step].time}</p>
                        <p class="text-gray-700 font-medium mt-1">${timeline[step].msg}</p>
                    `;
                    step++;
                } else {
                    clearInterval(simInterval);
                    btn.disabled = false;
                    btn.className = "w-full py-2 bg-star-green text-white font-semibold text-xs rounded hover:bg-star-dark transition-colors uppercase tracking-wider z-10 relative shadow";
                }
            }, 1500);
        }

        // --- Services Selector Data (Page 5) ---
        const servicesData = [
            {
                title: "Trabajos en Altura",
                text: "Contamos con cuadrillas certificadas bajo estrictas normas ARAA para la limpieza exterior de vidrios, sellado de cristales de oficinas y finales de obra en altura. Seguridad total y pólizas al día."
            },
            {
                title: "Jardinería y Paisajismo",
                text: "Mantenimiento integral de espacios verdes corporativos, tratamiento de sanidad botánica, poda de árboles, fertilización sistemática y reposición garantizada de especies según contrato."
            },
            {
                title: "Control de Plagas",
                text: "Empresa plenamente habilitada por Resolución APRA. Prestamos servicios especializados de desratización, desinsectación de espacios, ahuyentamiento técnico de aves y tratamientos preventivos periódicos."
            },
            {
                title: "Limpieza Técnica de Final de Obra",
                text: "Puesta a punto meticulosa de instalaciones industriales o corporativas post-construcción o remodelación. Remoción de restos de pintura, selladores y suciedad pesada para entrega inmediata."
            }
        ];

        function selectService(idx) {
            const container = document.getElementById('service-content');
            
            // Set buttons active status
            for(let i=0; i<4; i++) {
                const btn = document.getElementById(`srv-btn-${i}`);
                if (btn) {
                    if (i === idx) {
                        btn.className = "p-3 bg-star-green text-white text-xs font-bold rounded-lg transition-all shadow-sm";
                    } else {
                        btn.className = "p-3 bg-white text-star-charcoal hover:bg-gray-100 text-xs font-bold rounded-lg transition-all border border-gray-200 shadow-sm";
                    }
                }
            }

            container.innerHTML = `
                <h4 class="font-bold text-star-dark text-base mb-2">${servicesData[idx].title}</h4>
                <p class="text-sm text-gray-600 leading-relaxed">${servicesData[idx].text}</p>
            `;
        }

        // --- References & Clients Data (Page 7) ---
        const clientList = [
            { name: "Toyota Panamericana", feedback: "Cumplen con nuestra exigente política de proveedores B2B. Trato directo e insumos de primera calidad." },
            { name: "Coca-Cola Argentina", feedback: "Destacamos su solidez en la gestión, flexibilidad comercial y servicios estables ininterrumpidos." },
            { name: "Burger King / Alsea", feedback: "Es muy gratificante trabajar con una empresa flexible donde la honestidad comercial es el lema diario." },
            { name: "Air Liquide", feedback: "Proveedor corporativo homologado cumpliendo estándares críticos de seguridad." },
            { name: "Yaguar", feedback: "Limpieza integral en grandes superficies de distribución mayorista." },
            { name: "Stihl", feedback: "Servicio técnico e infraestructura de limpieza en plantas corporativas." },
            { name: "Makro", feedback: "Abono estable de limpieza en sucursales comerciales e hipermercados." },
            { name: "Starbucks Coffee", feedback: "Soporte diario ágil en locales comerciales exigentes de alta circulación." },
            { name: "Johnson & Johnson", feedback: "Servicio de limpieza técnica en depósitos de alta criticidad sanitaria." },
            { name: "Aristocrat", feedback: "Mantenimiento estético y técnico de sus oficinas operativas centrales." },
            { name: "TNT", feedback: "Cobertura sistemática de limpieza en terminales logísticas de distribución." },
            { name: "Bioprocrearte", feedback: "Desinfección de alta seguridad en centros de salud y laboratorios biológicos." }
        ];

        function buildClientsList() {
            const grid = document.getElementById('clients-grid');
            grid.innerHTML = '';
            
            clientList.forEach((c, idx) => {
                const card = document.createElement('div');
                card.className = "bg-white p-3 rounded-lg border border-gray-200 shadow-sm flex flex-col justify-between hover:border-star-green transition-colors cursor-help";
                card.onclick = () => alertTestimonial(c.name, c.feedback);
                card.innerHTML = `
                    <span class="font-bold text-xs text-star-dark">${c.name}</span>
                    <span class="text-[9px] text-star-green font-semibold mt-2 uppercase tracking-wider block">Ver Referencia →</span>
                `;
                grid.appendChild(card);
            });
        }

        function filterClients() {
            const query = document.getElementById('client-search').value.toLowerCase();
            const grid = document.getElementById('clients-grid');
            grid.innerHTML = '';

            const filtered = clientList.filter(c => c.name.toLowerCase().includes(query));
            
            filtered.forEach(c => {
                const card = document.createElement('div');
                card.className = "bg-white p-3 rounded-lg border border-gray-200 shadow-sm flex flex-col justify-between hover:border-star-green transition-colors cursor-help";
                card.onclick = () => alertTestimonial(c.name, c.feedback);
                card.innerHTML = `
                    <span class="font-bold text-xs text-star-dark">${c.name}</span>
                    <span class="text-[9px] text-star-green font-semibold mt-2 uppercase tracking-wider block">Ver Referencia →</span>
                `;
                grid.appendChild(card);
            });
        }

        // Custom notification to bypass browser alerts
        function alertTestimonial(name, feedback) {
            const existingModal = document.getElementById('custom-modal');
            if (existingModal) existingModal.remove();

            const modal = document.createElement('div');
            modal.id = 'custom-modal';
            modal.className = "fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50 transition-opacity duration-300";
            modal.innerHTML = `
                <div class="bg-white rounded-xl shadow-2xl max-w-sm w-full p-6 border-t-4 border-star-green relative">
                    <h4 class="font-bold text-lg text-star-dark">${name}</h4>
                    <p class="text-xs text-gray-500 uppercase tracking-wider mt-1">Garantía de Cliente Satisfecho</p>
                    <p class="text-sm text-gray-700 italic mt-4 bg-gray-50 p-3 rounded border border-gray-100">"${feedback}"</p>
                    <button onclick="document.getElementById('custom-modal').remove()" class="mt-6 w-full py-2 bg-star-dark hover:bg-star-green text-white text-xs font-bold rounded transition-colors uppercase tracking-wider">
                        Cerrar Referencia
                    </button>
                </div>
            `;
            document.body.appendChild(modal);
        }

        // --- Init App ---
        document.addEventListener('DOMContentLoaded', () => {
            renderPage();
        });
    </script>
</body>
</html>
